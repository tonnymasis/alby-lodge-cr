<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="#f8f9fa"/>
  <rect width="600" height="400" fill="url(#grid)"/>
  
  <!-- Simulated coastline -->
  <path d="M0,120 Q150,100 300,140 T600,160" stroke="#4a9eff" stroke-width="3" fill="none"/>
  <rect x="0" y="160" width="600" height="240" fill="#e3f2fd" opacity="0.3"/>
  
  <!-- Simulated location markers -->
  <circle cx="200" cy="180" r="8" fill="#1a5f4f"/>
  <circle cx="200" cy="180" r="12" fill="none" stroke="#1a5f4f" stroke-width="2"/>
  
  <text x="300" y="50" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a5f4f">CAHUITA</text>
  <text x="300" y="75" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">Mapa de Ubicación</text>
  <text x="220" y="200" font-family="Arial" font-size="12" text-anchor="start" fill="#1a5f4f">Alby Lodge</text>
  <text x="300" y="350" font-family="Arial" font-size="11" text-anchor="middle" fill="#999">[Reemplazar con mapa real]</text>
</svg>